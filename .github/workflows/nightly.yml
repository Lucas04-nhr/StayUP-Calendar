name: Nightly CI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: "0 16 * * *" # Every day at 16:00 UTC
  pull_request:
    branches:
      - main

concurrency:
  group: pubspec-build-bump-${{ github.event.repository.default_branch }}
  cancel-in-progress: false

permissions:
  contents: write
  actions: read
  pull-requests: read

jobs:
  ci:
    if: github.event_name != 'push' || !(startsWith(github.event.head_commit.message, 'chore') && contains(github.event.head_commit.message, 'Bump build number to '))
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bump pubspec build number
        if: github.event_name != 'pull_request'
        id: bump_build
        shell: bash
        run: |
          set -euo pipefail

          VERSION_LINE="$(grep -E '^version:' pubspec.yaml | awk '{print $2}')"
          if [ -z "$VERSION_LINE" ]; then
            echo "Failed to read version from pubspec.yaml" >&2
            exit 1
          fi

          BASE_VERSION="${VERSION_LINE%%+*}"
          if [ "$BASE_VERSION" = "$VERSION_LINE" ]; then
            echo "pubspec.yaml version must include build number suffix (+N). Got: $VERSION_LINE" >&2
            exit 1
          fi

          BUILD_NUMBER="${VERSION_LINE##*+}"
          if ! [[ "$BUILD_NUMBER" =~ ^[0-9]+$ ]]; then
            echo "Invalid build number in pubspec.yaml version: $VERSION_LINE" >&2
            exit 1
          fi

          NEXT_BUILD_NUMBER=$((BUILD_NUMBER + 1))
          NEXT_VERSION="${BASE_VERSION}+${NEXT_BUILD_NUMBER}"
          sed -i "s/^version: .*/version: ${NEXT_VERSION}/" pubspec.yaml

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pubspec.yaml
          git commit -m "chore: Bump build number to ${NEXT_BUILD_NUMBER}"

          TARGET_BRANCH="${GITHUB_REF_NAME}"
          if [ -z "$TARGET_BRANCH" ]; then
            TARGET_BRANCH="${{ github.event.repository.default_branch }}"
          fi
          git push origin "HEAD:${TARGET_BRANCH}"

          echo "BUILD_NUMBER=${NEXT_BUILD_NUMBER}" >> "$GITHUB_OUTPUT"

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Compute build metadata
        id: build_meta
        shell: bash
        run: |
          set -euo pipefail
          VERSION_LINE="$(grep -E '^version:' pubspec.yaml | awk '{print $2}')"
          if [ -z "$VERSION_LINE" ]; then
            echo "Failed to read version from pubspec.yaml" >&2
            exit 1
          fi

          BASE_VERSION="${VERSION_LINE%%+*}"
          if [ "$BASE_VERSION" = "$VERSION_LINE" ]; then
            echo "pubspec.yaml version must include build number suffix (+N). Got: $VERSION_LINE" >&2
            exit 1
          fi

          BUILD_NUMBER="${VERSION_LINE##*+}"
          if ! [[ "$BUILD_NUMBER" =~ ^[0-9]+$ ]]; then
            echo "Invalid build number in pubspec.yaml version: $VERSION_LINE" >&2
            exit 1
          fi

          SHORT_SHA="$(git rev-parse --short HEAD)"
          echo "BUILD_NAME=${BASE_VERSION}-${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "BUILD_NUMBER=${BUILD_NUMBER}" >> "$GITHUB_OUTPUT"

      - name: Setup Android signing
        shell: bash
        run: |
          set -euxo pipefail
          if [ -z "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" ] || \
             [ -z "${{ secrets.ANDROID_STORE_PASSWORD }}" ] || \
             [ -z "${{ secrets.ANDROID_KEY_ALIAS }}" ]; then
            echo "Signing secrets not found, using default signing for CI build."
            exit 0
          fi
          printf '%s' "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/upload-keystore.jks
          {
            echo "storePassword=${{ secrets.ANDROID_STORE_PASSWORD }}"
            echo "keyPassword=${{ secrets.ANDROID_STORE_PASSWORD }}"
            echo "keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}"
            echo "storeFile=../upload-keystore.jks"
          } > android/key.properties
          keytool -list -v \
            -keystore android/upload-keystore.jks \
            -storepass "${{ secrets.ANDROID_STORE_PASSWORD }}" \
            -alias "${{ secrets.ANDROID_KEY_ALIAS }}" > /dev/null

      - name: Setup Android SDK components
        shell: bash
        env:
          ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
        run: |
          set -euxo pipefail
          SDKMANAGER="$(command -v sdkmanager || true)"
          if [ -z "$SDKMANAGER" ]; then
            SDKMANAGER="$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager"
          fi

          yes | "$SDKMANAGER" --licenses || true
          "$SDKMANAGER" \
            "platform-tools" \
            "platforms;android-36" \
            "build-tools;35.0.0" \
            "cmake;3.22.1" \
            "ndk;28.2.13676358"

      - name: Analyze
        run: flutter analyze --no-fatal-warnings --no-fatal-infos

      - name: Build APK
        run: flutter build apk --debug --target-platform android-arm64 --build-name "${{ steps.build_meta.outputs.BUILD_NAME }}" --build-number "${{ steps.build_meta.outputs.BUILD_NUMBER }}" --obfuscate --split-debug-info=build/app/outputs/symbols --tree-shake-icons

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: nightly-apk
          path: build/app/outputs/flutter-apk/app-debug.apk

  build-ios-ipa:
    if: github.event_name != 'push' || !(startsWith(github.event.head_commit.message, 'chore') && contains(github.event.head_commit.message, 'Bump build number to '))
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Compute build metadata
        id: build_meta
        shell: bash
        run: |
          set -euo pipefail
          VERSION_LINE="$(grep -E '^version:' pubspec.yaml | awk '{print $2}')"
          if [ -z "$VERSION_LINE" ]; then
            echo "Failed to read version from pubspec.yaml" >&2
            exit 1
          fi

          BASE_VERSION="${VERSION_LINE%%+*}"
          if [ "$BASE_VERSION" = "$VERSION_LINE" ]; then
            echo "pubspec.yaml version must include build number suffix (+N). Got: $VERSION_LINE" >&2
            exit 1
          fi

          BUILD_NUMBER="${VERSION_LINE##*+}"
          if ! [[ "$BUILD_NUMBER" =~ ^[0-9]+$ ]]; then
            echo "Invalid build number in pubspec.yaml version: $VERSION_LINE" >&2
            exit 1
          fi

          SHORT_SHA="$(git rev-parse --short HEAD)"
          echo "BUILD_NAME=${BASE_VERSION}-${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "BUILD_NUMBER=${BUILD_NUMBER}" >> "$GITHUB_OUTPUT"

      - name: Check iOS signing secrets
        id: ios_signing
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${{ secrets.IOS_DISTRIBUTION_CERT_BASE64 }}" ] || \
             [ -z "${{ secrets.IOS_DISTRIBUTION_CERT_PASSWORD }}" ] || \
             [ -z "${{ secrets.IOS_APPSTORE_PROFILE_BASE64 }}" ] || \
             [ -z "${{ secrets.IOS_APPSTORE_PROFILE_NAME }}" ] || \
             [ -z "${{ secrets.IOS_TEAM_ID }}" ]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "iOS signing secrets are missing; skipping nightly iOS IPA build."
          else
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Import signing certificate
        if: steps.ios_signing.outputs.enabled == 'true'
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.IOS_DISTRIBUTION_CERT_BASE64 }}
          p12-password: ${{ secrets.IOS_DISTRIBUTION_CERT_PASSWORD }}

      - name: Install provisioning profile
        if: steps.ios_signing.outputs.enabled == 'true'
        shell: bash
        run: |
          set -euo pipefail
          PROFILE_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PROFILE_DIR"
          PROFILE_PATH="$RUNNER_TEMP/appstore.mobileprovision"
          printf '%s' "${{ secrets.IOS_APPSTORE_PROFILE_BASE64 }}" | base64 --decode > "$PROFILE_PATH"
          UUID=$(/usr/libexec/PlistBuddy -c 'Print UUID' /dev/stdin <<< "$(security cms -D -i "$PROFILE_PATH")")
          cp "$PROFILE_PATH" "$PROFILE_DIR/$UUID.mobileprovision"

      - name: Generate export options
        if: steps.ios_signing.outputs.enabled == 'true'
        shell: bash
        run: |
          set -euo pipefail
          cat > ios/ExportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>teamID</key>
            <string>${{ secrets.IOS_TEAM_ID }}</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>com.stayup.schedule</key>
              <string>${{ secrets.IOS_APPSTORE_PROFILE_NAME }}</string>
            </dict>
          </dict>
          </plist>
          EOF

      - name: Build signed IPA
        if: steps.ios_signing.outputs.enabled == 'true'
        run: flutter build ipa --release --build-name "${{ steps.build_meta.outputs.BUILD_NAME }}" --build-number "${{ steps.build_meta.outputs.BUILD_NUMBER }}" --export-options-plist=ios/ExportOptions.plist

      - name: Upload IPA artifact
        if: steps.ios_signing.outputs.enabled == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: nightly-ipa
          path: build/ios/ipa/*.ipa
